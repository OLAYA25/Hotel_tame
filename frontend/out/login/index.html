<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Tame</title>
    <link href="/Hotel_tame/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/Hotel_tame/assets/css/main.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h4>🏨 Hotel Tame</h4>
                        <p class="mb-0">Sistema de Gestión Hotelera</p>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">
                                    Recordarme
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <span id="loginText">Iniciar Sesión</span>
                                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </form>
                        
                        <div id="alertContainer" class="mt-3"></div>
                        
                        <hr>
                        <div class="text-center">
                            <small class="text-muted">
                                <a href="/Hotel_tame/" class="text-decoration-none">Volver al inicio</a>
                            </small>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4 text-center">
                    <div class="alert alert-info">
                        <h5>🎉 Nueva Estructura del Sistema</h5>
                        <p class="mb-0">El proyecto ha sido reestructurado con:</p>
                        <ul class="text-start">
                            <li>✅ Backend PHP organizado</li>
                            <li>✅ Frontend Next.js estático</li>
                            <li>✅ Router PHP central</li>
                            <li>✅ URLs amigables</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            const alertContainer = document.getElementById('alertContainer');
            
            // Mostrar loading
            loginText.textContent = 'Iniciando...';
            loginSpinner.classList.remove('d-none');
            
            try {
                const response = await fetch('/Hotel_tame/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', 'Login exitoso. Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = '/Hotel_tame/dashboard';
                    }, 1500);
                } else {
                    showAlert('danger', data.error || 'Error al iniciar sesión');
                }
            } catch (error) {
                showAlert('danger', 'Error de conexión. Intente nuevamente.');
            } finally {
                loginText.textContent = 'Iniciar Sesión';
                loginSpinner.classList.add('d-none');
            }
        });
        
        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
</body>
</html>
