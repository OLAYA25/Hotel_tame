<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - Hotel Tame</title>
    <link href="/Hotel_tame/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/Hotel_tame/assets/css/main.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h4>🔐 Test Login API</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <h5>Credenciales de Prueba:</h5>
                            <div class="alert alert-info">
                                <strong>Admin:</strong> admin@hotel.com / admin123<br>
                                <strong>Usuario:</strong> user@hotel.com / user123
                            </div>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" value="admin@hotel.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" value="admin123" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <span id="loginText">Iniciar Sesión</span>
                                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </form>
                        
                        <div id="resultContainer" class="mt-3"></div>
                        
                        <hr>
                        
                        <div class="d-grid gap-2">
                            <button onclick="checkAuth()" class="btn btn-outline-primary">Verificar Autenticación</button>
                            <button onclick="logout()" class="btn btn-outline-danger">Cerrar Sesión</button>
                            <a href="/Hotel_tame/login" class="btn btn-outline-secondary">Ir al Login Real</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            const resultContainer = document.getElementById('resultContainer');
            
            // Mostrar loading
            loginText.textContent = 'Iniciando...';
            loginSpinner.classList.remove('d-none');
            
            try {
                const response = await fetch('/Hotel_tame/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', 'Login exitoso: ' + data.message);
                    showAlert('info', 'Usuario: ' + data.user.nombre + ' ' + data.user.apellido + ' (' + data.user.rol + ')');
                } else {
                    showAlert('danger', 'Error: ' + data.error);
                }
            } catch (error) {
                showAlert('danger', 'Error de conexión: ' + error.message);
            } finally {
                loginText.textContent = 'Iniciar Sesión';
                loginSpinner.classList.add('d-none');
            }
        });
        
        async function checkAuth() {
            try {
                const response = await fetch('/Hotel_tame/api/auth?check', {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.authenticated) {
                    showAlert('success', 'Autenticado: ' + data.user.nombre + ' ' + data.user.apellido);
                } else {
                    showAlert('warning', 'No autenticado');
                }
            } catch (error) {
                showAlert('danger', 'Error: ' + error.message);
            }
        }
        
        async function logout() {
            try {
                const response = await fetch('/Hotel_tame/api/auth', {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', 'Sesión cerrada');
                } else {
                    showAlert('danger', 'Error al cerrar sesión');
                }
            } catch (error) {
                showAlert('danger', 'Error: ' + error.message);
            }
        }
        
        function showAlert(type, message) {
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
        
        // Verificar autenticación al cargar
        window.addEventListener('load', checkAuth);
    </script>
</body>
</html>
