version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoteltame-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./logs:/var/www/html/logs
      - ./storage:/var/www/html/storage
    networks:
      - hoteltame-network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_DATABASE=hotel_management_system
      - DB_USERNAME=hoteltame
      - DB_PASSWORD=hoteltame123
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: hoteltame-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hoteltame-network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: hoteltame-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: hotel_management_system
      MYSQL_USER: hoteltame
      MYSQL_PASSWORD: hoteltame123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - hoteltame-network
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hoteltame-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hoteltame-network
    command: redis-server --appendonly yes --requirepass redis123

  # Redis Commander (Optional GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hoteltame-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:redis123
    networks:
      - hoteltame-network
    depends_on:
      - redis

  # PHPMyAdmin (Optional GUI)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hoteltame-phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: hoteltame
      PMA_PASSWORD: hoteltame123
      MYSQL_ROOT_PASSWORD: root123
    networks:
      - hoteltame-network
    depends_on:
      - mysql

  # MailHog (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hoteltame-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port
    networks:
      - hoteltame-network

networks:
  hoteltame-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
